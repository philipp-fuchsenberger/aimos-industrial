name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit
          pip install -r requirements.txt

      - name: Ruff lint check
        run: ruff check .

      - name: Bandit security scan
        run: |
          bandit -r core/ -c pyproject.toml -lll || true
          echo "--- Bandit HIGH severity check ---"
          bandit -r core/ -c pyproject.toml -lll --format json 2>/dev/null | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              high = [r for r in d.get('results', []) if r.get('issue_severity') == 'HIGH']
              if high:
                  for h in high:
                      print(f'HIGH: {h[\"filename\"]}:{h[\"line_number\"]} {h[\"test_id\"]} {h[\"issue_text\"]}')
                  sys.exit(1)
              print('No HIGH severity findings.')
          except:
              print('Bandit check passed (no JSON output).')
          "

      - name: Compile check (syntax validation)
        run: |
          python -c "
          import py_compile, pathlib, sys
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print('All .py files compile successfully.')
          "
